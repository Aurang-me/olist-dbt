version: 2

models:
  - name: dim_customers
    description: One row per customer with order history metrics
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: state
        tests:
          - not_null

  - name: dim_products
    description: One row per product with sales metrics
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: One row per seller with sales metrics
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique
      - name: total_revenue
        tests:
          - not_null

  - name: fct_orders
    description: One row per order with items, payments and review metrics
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']
      - name: total_order_value
        tests:
          - not_null
