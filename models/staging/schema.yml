version: 2

models:
  - name: stg_orders
    description: Cleaned orders data
    columns:
      - name: order_id
        description: Primary key
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_customers
    description: Cleaned customers data
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null
      - name: state
        tests:
          - not_null

  - name: stg_order_items
    description: Cleaned order items data
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_products
    description: Cleaned products data
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_payments
    description: Cleaned payments data
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_value
        tests:
          - not_null

  - name: stg_reviews
    description: Cleaned reviews data
    columns:
      - name: review_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: ['1', '2', '3', '4', '5']

  - name: stg_sellers
    description: Cleaned sellers data
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: stg_geolocation
    description: Cleaned geolocation data
    columns:
      - name: zip_code
        tests:
          - not_null